name: CI

on:
  # Run on every branch push and on all pull requests.
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  # Opt in now to the Node 24 runtime for JavaScript-based GitHub Actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Main quality gate: install deps, compile Python files, then run tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt runtime system dependencies
        # PySide6 needs these Linux shared libs even in headless/offscreen CI.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcb-cursor0 \
            libxext6 \
            libxrender1 \
            libxkbcommon-x11-0

      - name: Setup Python
        # Single supported CI interpreter to keep pipeline fast and deterministic.
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # requirements-dev includes runtime + test/build tooling.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile check
        # Fail early on syntax/import-time compilation issues.
        run: python -m compileall -q core gui scripts tests main.py

      - name: Run tests
        env:
          # Ensure Qt does not require a real display server in CI.
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

  # Packaging smoke test: confirms the app can still be bundled.
  package-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt runtime system dependencies
        # Keep package job environment aligned with test job environment.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcb-cursor0 \
            libxext6 \
            libxrender1 \
            libxkbcommon-x11-0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build with PyInstaller
        # Build the distributable binary from the project spec file.
        run: pyinstaller --noconfirm main.spec

      - name: Validate artifact
        # Basic assertion that the expected binary exists after build.
        run: test -f dist/document-mapper
