[app]
name = "Document Mapper"
version = "2.2"
description = "A desktop app for mapping DOCX files from Excel data."
author = "Younes Rabeh"
organization = "Younes Rabeh"
domain = "github.com"
language = "en"

[logging]
persistence_logging = true

[window]
width = 1400
height = 750
min_width = 1400
min_height = 400
title = "Document Mapper"
theme_mode = "AUTO"

[resources]        # Resource directories configuration [DO NOT CHANGE]
base = "resources" # Base resources directory [DO NOT CHANGE]
qss = "resources/qss"
icons = "resources/icons"
images = "resources/images"
defaults = "resources/defaults"
locales = "resources/locales"
