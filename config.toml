[app]
name = "Document Mapper"
version = "0.6"
description = "A desktop app for generating certificate DOCX files from Excel data."
author = "Younes Rabeh"
organization = "Younes Rabeh"
domain = "younesrabeh.com"

[logging]
persistence_logging = true

[window]
width = 800
height = 500
min_width = 960
min_height = 640
title = "Document Mapper"
theme_mode = "AUTO"

[resources]        # Resource directories configuration [DO NOT CHANGE]
base = "resources" # Base resources directory [DO NOT CHANGE]
qss = "resources/qss"
icons = "resources/icons"
images = "resources/images"
fonts = "resources/fonts"
data = "resources/data"
temp = "resources/temp"
templates = "resources/templates"
